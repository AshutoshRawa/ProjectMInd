# =============================================================================
# ProjectMind — Default Configuration
# =============================================================================
# This file provides all default settings for the ProjectMind system.
# You can override any value by:
#   1. Copying this file to config/config.yaml and editing it.
#   2. Setting an environment variable prefixed with PROJECTMIND_
#      e.g. PROJECTMIND_LOGGING__LEVEL=DEBUG overrides logging.level
# =============================================================================

# ---------------------------------------------------------------------------
# Application-level identity
# ---------------------------------------------------------------------------
app:
  name: "ProjectMind"
  version: "0.1.0"
  description: "Autonomous AI-powered developer memory and documentation engine"
  # Unique identifier for this ProjectMind installation (auto-generated on
  # first run if left blank).
  instance_id: ""

# ---------------------------------------------------------------------------
# Paths — all relative to the project root unless they start with /
# ---------------------------------------------------------------------------
paths:
  # Root directory that ProjectMind will monitor (can be overridden per-run)
  project_root: "."
  # Where rotating log files are written
  logs_dir: "logs"
  # Obsidian-compatible vault for all generated documentation
  vault_dir: "vault"
  # Ephemeral config overrides placed here at runtime
  runtime_config: "config/runtime.yaml"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  # Minimum severity to capture: DEBUG | INFO | WARNING | ERROR | CRITICAL
  level: "INFO"
  # Maximum size of a single log file before it rotates (bytes)
  max_bytes: 5242880          # 5 MB
  # How many rotated log files to keep alongside the current one
  backup_count: 5
  # Emit coloured output to the console (disable in CI pipelines)
  console_color: true
  # ISO-8601 timestamp in every log line
  include_timestamp: true
  # Name of the primary log file inside paths.logs_dir
  filename: "projectmind.log"

# ---------------------------------------------------------------------------
# Vault — Obsidian-compatible knowledge store
# ---------------------------------------------------------------------------
vault:
  # Sub-folders created automatically inside vault_dir
  sections:
    - "Architecture"
    - "Features"
    - "APIs"
    - "Bugs"
    - "Daily"
    - "Generated"
    - "Graphs"
    - "AI-Prompts"
    - "Memory"
  # Markdown front-matter template fields added to every generated note
  frontmatter:
    author: "ProjectMind"
    tags: []
    status: "draft"

# ---------------------------------------------------------------------------
# AI / Ollama integration — Module 3: AI Communication Engine
# ---------------------------------------------------------------------------
ai:
  # Ollama server endpoint
  ollama_host: "http://localhost:11434"
  # Default Qwen model (must be pulled: ollama pull qwen2.5-coder:14b)
  default_model: "qwen2.5-coder:14b"
  # Fallback model when the default is unavailable
  fallback_model: "qwen2.5-coder:14b"
  # Request timeout in seconds
  timeout: 120
  # Maximum tokens per response (maps to Ollama num_predict)
  max_tokens: 4096
  # Temperature (0 = deterministic, 1 = creative)
  temperature: 0.2
  # Retries for transient network / server errors
  max_retries: 3
  # Base delay between retries (seconds); doubles each attempt
  retry_backoff_seconds: 1.0

# ---------------------------------------------------------------------------
# Watcher — Module 2: filesystem monitoring
# ---------------------------------------------------------------------------
watcher:
  # Set true to run the watcher loop from main.py
  enabled: false
  # Directories under paths.project_root to monitor (skipped if missing)
  watch_dirs:
    - "backend"
    - "frontend"
    - "src"
    - "app"
  # Directory *names* ignored anywhere in the watch tree
  ignore_dirs: []
  # Additional glob patterns (fnmatch on POSIX paths)
  ignore_patterns:
    - "**/__pycache__/**"
    - "**/pycache/**"
    - "**/.git/**"
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/venv/**"
    - "**/.venv/**"
    - "**/.next/**"
    - "**/coverage/**"
    - "**/*.pyc"
    - "**/logs/**"
    - "**/vault/**"
  # Quiet period after the last raw event before logging (seconds)
  debounce_seconds: 2.0
  # File extensions that produce events
  watch_extensions:
    - ".py"
    - ".js"
    - ".ts"
    - ".tsx"
    - ".jsx"
    - ".md"
    - ".json"

# ---------------------------------------------------------------------------
# Analysis engine (placeholder — activated in Module 4)
# ---------------------------------------------------------------------------
analysis:
  enabled: false
  # Maximum number of files to analyse in a single batch
  batch_size: 20
  # Skip files larger than this (bytes) to avoid memory pressure
  max_file_size: 524288        # 512 KB

# ---------------------------------------------------------------------------
# Memory / graph (placeholder — activated in Module 5+)
# ---------------------------------------------------------------------------
memory:
  enabled: false
  # Rolling window: how many days of context to retain as "active" memory
  retention_days: 90

graph:
  enabled: false
  # Output format for generated Obsidian graph data
  format: "markdown-links"
